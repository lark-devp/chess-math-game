<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Check-Math</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #1a1a1a; --text: #ffffff; --board-dark: #769656; --board-light: #eeeed2; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        h1 { margin: 0 0 5px 0; font-size: 24px; text-align: center; }
        .level-text { font-size: 14px; color: #aaa; margin-bottom: 15px; }
        .hud { display: flex; justify-content: space-between; width: 300px; background: #333; padding: 10px; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; }
        .hud div { font-size: 20px; font-weight: bold; }
         .board-container { position: relative; width: 300px; height: 300px; }
        #board { display: grid; grid-template-columns: repeat(4, 75px); grid-template-rows: repeat(4, 75px); border: 4px solid #333; border-radius: 4px; overflow: hidden; }
        #image-overlay {position: absolute;top: 0; left: 0;width: 100%; height: 100%;display: none; /* Скрыта по умолчанию */z-index: 50;background-color: rgba(0,0,0,0.7);border-radius: 4px;
        justify-content: center;align-items: center;pointer-events: none; /* Чтобы не мешала кликам, когда исчезает */}
        #image-overlay img {max-width: 90%;max-height: 90%;border: 2px solid white;border-radius: 8px;object-fit: cover;}
        .cell { width: 75px; height: 75px; display: flex; justify-content: center; align-items: center; font-size: 36px; cursor: pointer; position: relative; user-select: none; }
        .light { background-color: var(--board-light); color: #333; }
        .dark { background-color: var(--board-dark); color: #111; }
        .selected { outline: 4px solid #ffcc00; outline-offset: -4px; z-index: 10; background-color: #ffeb99 !important; }
        .piece { position: absolute; z-index: 1; }
        .pawn-val { font-size: 16px; font-weight: bold; margin-top: 30px; color: #d32f2f; text-shadow: 1px 1px white; z-index: 2;}
        .op-val { font-size: 14px; font-weight: bold; margin-top: 30px; color: #1565c0; z-index: 2;}
        
        .controls { margin-top: 20px; display: flex; gap: 10px; width: 300px; justify-content: center; flex-wrap: wrap; }
        button { padding: 10px 15px; font-size: 15px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; flex: 1; min-width: 130px; }
        .btn-restart { background: #d32f2f; }
        .btn-skip { background: #2196F3; } 
        .hint-visible-btn {position: absolute;top: 10px;right: 10px;font-size: 10px;color: #444;background: transparent; /* Можно оставить прозрачным для минимализма */border: 1px solid #333;
    padding: 1px 3px;         /* Минимум пространства вокруг текста */min-width: 0 !important;  /* Сбрасываем общие настройки кнопок */width: auto !important;   /* Ширина только по контенту */height: auto !important;  /* Высота только по контенту */line-height: 1;           /* Убираем межстрочные интервалы */
    border-radius: 2px;cursor: pointer;z-index: 100;text-transform: lowercase;transition: all 0.2s;}/* Синий цвет для кнопки скипа */
        /* ДОБАВЛЕНО: Стиль для новой кнопки */
        /* Слегка проявляется при наведении, но не манит */
.hint-visible-btn:hover {color: #888;border-color: #555;}
        .btn-noun { background: #1a1a1a;}
        .pepe {  width: 45px; height: 45px; object-fit: contain; margin-bottom: 10px;}
        .secret-btn {position: absolute;top: 0;left: 0;width: 50px;height: 50px; background: transparent;z-index: 100;cursor: default;}
        .secret-btn-right {position: absolute; bottom: 0; right: 0; width: 50px; height: 50px; background: transparent; z-index: 100;}
.hint-piece { outline: 5px solid #ff9800 !important; outline-offset: -5px; z-index: 15;animation: pulse-hint 1s infinite;}
.hint-target {outline: 5px solid #2196F3 !important; outline-offset: -5px; z-index: 15; animation: pulse-hint 1s infinite;}

@keyframes pulse-hint {0% { box-shadow: inset 0 0 10px #fff; opacity: 1; }50% { box-shadow: inset 0 0 30px #fff; opacity: 0.7; }100% { box-shadow: inset 0 0 10px #fff; opacity: 1; }}
        #message { margin-top: 15px; height: 20px; color: #ffeb3b; font-weight: bold; font-size: 14px; text-align: center; }
    </style>
</head>
<body>
    <div class="secret-btn" onclick="showNextIntrovertCourse()"></div>
    <button class="hint-visible-btn" onclick="giveHint()">hint</button>
    <h1>Chess Math</h1>
    <div class="level-text">Level: <span id="level-display">1</span></div>
    
    <div class="hud">
        <div>Sum: <span id="current-val">1</span></div>
        <div>Goal: <span id="target-val">0</span></div>
    </div>

    <div class="board-container">
        <div id="board"></div>
        <div id="image-overlay"><img src="" id="overlay-img"></div>
    </div>
    <div id="message"></div>
    
    <div class="controls">
        <button class="btn-restart" onclick="restartCurrentLevel()">↺ Reset</button>
        <button class="btn-skip" onclick="skipLevel()">Skip </button>
        <button class="btn-noun" onclick="generateRandomNoun()"></button>
    </div>
    <div class="secret-btn-right" onclick="showNextOperaCourse()"></div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentLevel = 1;
        let currentVal = 1;
        let targetVal = 0;
        let selectedPiece = null;
        let pieces = [];
        let pawns = [];
        
        let startPieces = []; 
        let startPawns = [];  

       const boardEl = document.getElementById('board'), currentValEl = document.getElementById('current-val');
        const targetValEl = document.getElementById('target-val'), levelEl = document.getElementById('level-display'), msgEl = document.getElementById('message');
        const imgOverlay = document.getElementById('image-overlay'), overlayImg = document.getElementById('overlay-img');
        
         function solve(val, ps, pns) {
            if (pns.length === 0) return val === targetVal ? [] : null;

            for (let i = 0; i < ps.length; i++) {
                let p = ps[i];
                for (let j = 0; j < pns.length; j++) {
                    let pawn = pns[j];
                    
                    let canReach = false;
                    if (p.id === 'rook' && (p.r === pawn.r || p.c === pawn.c)) canReach = true;
                    if (p.id === 'bishop' && Math.abs(p.r - pawn.r) === Math.abs(p.c - pawn.c)) canReach = true;
                    
                    if (canReach && isPathClear(p.r, p.c, pawn.r, pawn.c, [...ps, ...pns])) {
                        let newVal = val;
                        if (p.op === '+') newVal += pawn.val;
                        if (p.op === '*') newVal *= pawn.val;

                        let nextPs = JSON.parse(JSON.stringify(ps));
                        nextPs[i].r = pawn.r;
                        nextPs[i].c = pawn.c;
                        let nextPns = pns.filter((_, idx) => idx !== j);

                        let res = solve(newVal, nextPs, nextPns);
                        if (res !== null) {
                            return [{ pieceId: p.id, targetR: pawn.r, targetC: pawn.c, pawnVal: pawn.val }, ...res];
                        }
                    }
                }
            }
            return null;
        }

        function giveHint() {
            const solution = solve(currentVal, pieces, pawns);
            
            if (!solution) {
                showMessage("Из этой позиции нет решения! Нажми Reset.");
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            const nextMove = solution[0];
            highlightHint(nextMove);
            
            const pieceName = nextMove.pieceId === 'rook' ? 'Ладью' : 'Слона';
            showMessage(`Ходи: ${pieceName} на пешку ${nextMove.pawnVal}`);
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function highlightHint(move) {
    const cells = document.querySelectorAll('.cell');
    
    cells.forEach((cell, index) => {
        const r = Math.floor(index / 4);
        const c = index % 4;

        // 1. Ищем клетку, где стоит нужная фигура
        const isPiece = pieces.some(p => p.id === move.pieceId && p.r === r && p.c === c);
        
        // 2. Ищем клетку, где стоит целевая пешка
        const isTarget = (r === move.targetR && c === move.targetC);

        if (isPiece) {
            cell.classList.add('hint-piece');
            setTimeout(() => cell.classList.remove('hint-piece'), 3000);
        }

        if (isTarget) {
            cell.classList.add('hint-target');
            setTimeout(() => cell.classList.remove('hint-target'), 3000);
        }
    });
}

     


let introvertCourses = [];
let introvertIndex = 0;
let isFetching = false;

async function showNextIntrovertCourse() {
    // Вибрация при нажатии
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

    // 1. Если массив пуст, загружаем данные один раз
    if (introvertCourses.length === 0 && !isFetching) {
        isFetching = true;
        showMessage("Загрузка каталога...");

        try {
            // Используем CORS прокси, чтобы браузер не блокировал запрос
            const proxy = "https://cors-anywhere.herokuapp.com/";
            const url = "https://api.artforintrovert.ru/api/v3/courses?limit=24&offset=0&enableLanguages=true&availability=6";

            const res = await fetch(proxy + url);
            const json = await res.json();

            // Твоя структура: data -> courses (массив)
            if (json.data && Array.isArray(json.data.courses)) {
                introvertCourses = json.data.courses;
                introvertCourses = json.data.courses.map(c => ({
                    title: c.title,
                    img: c.previewImages ? c.previewImages.mobile : null
                }));
                console.log("Курсы успешно загружены. Найдено:", introvertCourses.length);
            } else {
                throw new Error("Неверная структура данных");
            }
        } catch (err) {
            console.error("Ошибка загрузки:", err);
            // Запасной список на случай, если прокси или API упадет
            introvertCourses = [
                { title: "История кино: жанры Голливуда" },
                { title: "Как понимать искусство?" },
                { title: "Психология: основы" }
            ];
            showMessage("Оффлайн-режим");
        } finally {
            isFetching = false;
        }
    }

    // 2. Выводим заголовки по очереди
    if (introvertCourses.length > 0) {
        const course = introvertCourses[introvertIndex];
        
        // Показываем title
        showMessage(course.title);
        if (course.img) {
            overlayImg.src = course.img;
            imgOverlay.style.display = 'flex';
            
            clearTimeout(window.imgTimer);
            window.imgTimer = setTimeout(() => {
                imgOverlay.style.display = 'none';
            }, 5500);
        } else {
            imgOverlay.style.display = 'none';
        }

        // Увеличиваем индекс для следующего клика (и зацикливаем его)
        introvertIndex = (introvertIndex + 1) % introvertCourses.length;
    }
}
let operaItems = [], operaIndex = 0;

async function showNextOperaCourse() {
    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

    if (operaItems.length === 0) {
        showMessage("Загрузка викторины...");
        try {
            const proxy = "https://cors-anywhere.herokuapp.com/";
            
            // 1. Запрос списка подборок
            const compilationsUrl = "https://api.artforintrovert.ru/api/v3/compilations";
            const compRes = await fetch(proxy + compilationsUrl);
            const compJson = await compRes.json();
            
            // Проверяем, что ответ содержит массив compilations и берем id первого элемента
            if (compJson.data && compJson.data.compilations && compJson.data.compilations.length > 0) {
                const firstId = compJson.data.compilations[0].id;
                
                // 2. Делаем запрос уже по конкретной подборке с полученным id
                const url = `https://api.artforintrovert.ru/api/v3/compilations/${firstId}`;
                const res = await fetch(proxy + url);
                const json = await res.json();

                if (json.data && json.data.compilation) {
                    const comp = json.data.compilation;
                    // Первая в списке - сама викторина (без картинки)
                    operaItems.push({ title: comp.title, img: null });
                    
                    comp.courses.forEach(c => {
                        operaItems.push({ 
                            title: c.title, 
                            img: c.previewImages ? c.previewImages.mobile : null 
                        });
                    });
                }
            } else {
                showMessage("Подборки не найдены!");
            }
        } catch (err) { 
            console.error("Ошибка API:", err);
            showMessage("Нужна активация CORS Anywhere!"); 
        }
    }

    if (operaItems.length > 0) {
        const item = operaItems[operaIndex];
        showMessage(item.title);

        if (item.img) {
            overlayImg.src = item.img;
            imgOverlay.style.display = 'flex';
            
            clearTimeout(window.imgTimer);
            window.imgTimer = setTimeout(() => {
                imgOverlay.style.display = 'none';
            }, 5500);
        } else {
            imgOverlay.style.display = 'none';
        }

        operaIndex = (operaIndex + 1) % operaItems.length;
    }
}
       // Хранилище для терминов, чтобы не делать запросы слишком часто
let securityTerms = [];

async function generateRandomNoun() {
    showMessage("Ищу термин... 🔒");
    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

    try {
        // Если список пуст, загружаем термины из категорий ИБ и Криптографии
        if (securityTerms.length === 0) {
            // Запросы к API Википедии для получения названий статей из категорий
            const categories = ['Информационная_безопасность', 'Криптография'];
            
            for (let cat of categories) {
                const url = `https://ru.wikipedia.org/w/api.php?action=query&list=categorymembers&cmtitle=Category:${cat}&cmlimit=500&format=json&origin=*`;
                const response = await fetch(url);
                const data = await response.json();
                
                // Фильтруем: убираем служебные страницы и категории
                const items = data.query.categorymembers
                    .map(item => item.title)
                    .filter(title => !title.includes("Категория:") && !title.includes("Файл:"));
                
                securityTerms.push(...items);
            }
            
            // Добавляем немного классики вручную на случай сбоя API
            securityTerms.push("Блокчейн", "Хэширование", "Брутфорс", "Фишинг", "Двухфакторная аутентификация", "SQL-инъекция", "Межсетевой экран", "Шифр Цезаря", "Стеганография", "Троянская программа");
        }

        // Выбираем случайный термин
        const randomIndex = Math.floor(Math.random() * securityTerms.length);
        let term = securityTerms[randomIndex];

        // Убираем уточнения в скобках, если они есть
        term = term.split(' (')[0];

        showMessage(term);
        if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

    } catch (error) {
        showMessage("Ошибка доступа к базе");
        console.error("Ошибка:", error);
    }
}
        
        let messageTimeout;
        function showMessage(text) {
            msgEl.innerText = text;
            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => { msgEl.innerText = ''; }, 5500);
        }


        function isPathClear(r1, c1, r2, c2, allEntities) {
            let dr = Math.sign(r2 - r1);
            let dc = Math.sign(c2 - c1);
            let r = r1 + dr;
            let c = c1 + dc;
            
            while (r !== r2 || c !== c2) {
                if (allEntities.some(e => e.r === r && e.c === c)) return false;
                r += dr;
                c += dc;
            }
            return true;
        }

        // ПРОДВИНУТЫЙ ВАЛИДАТОР (СИМУЛИРУЕТ ИГРОКА)
        function isSolvable(startVal, targetVal, pieces, pawns) {
            function dfs(currentVal, currentPieces, currentPawns) {
                if (currentPawns.length === 0) return currentVal === targetVal;
                
                for (let i = 0; i < currentPieces.length; i++) {
                    let p = currentPieces[i];
                    for (let j = 0; j < currentPawns.length; j++) {
                        let pawn = currentPawns[j];
                        
                        let validChessMove = false;
                        if (p.id === 'rook' && (p.r === pawn.r || p.c === pawn.c)) validChessMove = true;
                        if (p.id === 'bishop' && Math.abs(p.r - pawn.r) === Math.abs(p.c - pawn.c)) validChessMove = true;
                        
                        if (validChessMove && isPathClear(p.r, p.c, pawn.r, pawn.c, [...currentPieces, ...currentPawns])) {
                            let newVal = currentVal;
                            if (p.op === '+') newVal += pawn.val;
                            if (p.op === '*') newVal *= pawn.val;
                            
                            let nextPieces = JSON.parse(JSON.stringify(currentPieces));
                            nextPieces[i].r = pawn.r;
                            nextPieces[i].c = pawn.c;
                            
                            let nextPawns = currentPawns.filter((_, index) => index !== j);
                            
                            // Рекурсивно ищем победный путь
                            if (dfs(newVal, nextPieces, nextPawns)) return true;
                        }
                    }
                }
                return false;
            }
            return dfs(startVal, pieces, pawns);
        }

        function generateLevelData(level) {
            let numPawns = Math.min(2 + level, 6); 
            
            let simPieces = [
                { id: 'rook', symbol: '♖', op: '+', r: 0, c: 0 },
                { id: 'bishop', symbol: '♗', op: '*', r: 3, c: 3 }
            ];
            
            simPieces.forEach(p => {
                p.r = Math.floor(Math.random() * 4);
                p.c = Math.floor(Math.random() * 4);
            });
            while(simPieces[0].r === simPieces[1].r && simPieces[0].c === simPieces[1].c) {
                simPieces[1].r = Math.floor(Math.random() * 4);
                simPieces[1].c = Math.floor(Math.random() * 4);
            }

            let initPieces = JSON.parse(JSON.stringify(simPieces));
            let simPawns = [];
            let simTarget = 1;

            for(let i = 0; i < numPawns; i++) {
                let moveFound = false;
                let attempts = 0;
                
                while(!moveFound && attempts < 100) {
                    attempts++;
                    let p = simPieces[Math.floor(Math.random() * simPieces.length)];
                    let targetR = Math.floor(Math.random() * 4);
                    let targetC = Math.floor(Math.random() * 4);
                    
                    if(p.r === targetR && p.c === targetC) continue;
                    if(initPieces.some(ip => ip.r === targetR && ip.c === targetC)) continue;

                    let allEntities = [...simPieces, ...simPawns];
                    if(allEntities.some(e => e.r === targetR && e.c === targetC)) continue;

                    let validChessMove = false;
                    if (p.id === 'rook' && (p.r === targetR || p.c === targetC)) validChessMove = true;
                    if (p.id === 'bishop' && Math.abs(p.r - targetR) === Math.abs(p.c - targetC)) validChessMove = true;

                    if (validChessMove && isPathClear(p.r, p.c, targetR, targetC, allEntities)) {
                        let pawnVal = Math.floor(Math.random() * 3) + 2; 
                        
                        if(p.op === '+') simTarget += pawnVal;
                        if(p.op === '*') simTarget *= pawnVal;

                        simPawns.push({ id: 'p'+i, symbol: '♙', val: pawnVal, r: targetR, c: targetC });
                        p.r = targetR;
                        p.c = targetC;
                        moveFound = true;
                    }
                }
                
                if(!moveFound) return generateLevelData(level); 
            }

            // САМАЯ ВАЖНАЯ СТРОЧКА: Проверяем, может ли ИГРОК пройти этот уровень
            if (!isSolvable(1, simTarget, initPieces, simPawns)) {
                return generateLevelData(level); // Если уровень сломан - тихо генерируем новый
            }

            // ДОБАВЛЕНО: Шанс 2% на появление Пепе
            if (Math.random() < 0.02) {
                // Выбираем случайную пешку из созданных
                let randomPawnIndex = Math.floor(Math.random() * simPawns.length);
                
                // Меняем ее значок на картинку Пепе
                simPawns[randomPawnIndex].symbol = '<img src="https://pngicon.ru/file/uploads/ljagushonok-pepe-64x61.png" class="pepe" alt="🐸">';
                
            }
            
            return { pieces: initPieces, pawns: simPawns, target: simTarget };
        }

        function startLevel(level) {
            currentLevel = level;
            levelEl.innerText = currentLevel;
            currentVal = 1; 
            selectedPiece = null;
            msgEl.innerText = '';
            
            const data = generateLevelData(level);
            startPieces = JSON.parse(JSON.stringify(data.pieces));
            startPawns = JSON.parse(JSON.stringify(data.pawns));
            
            pieces = JSON.parse(JSON.stringify(startPieces));
            pawns = JSON.parse(JSON.stringify(startPawns));
            targetVal = data.target;
            
            targetValEl.innerText = targetVal;
            renderBoard();
        }

        function restartCurrentLevel() {
            currentVal = 1;
            selectedPiece = null;
            msgEl.innerText = 'Ходы сброшены';
            pieces = JSON.parse(JSON.stringify(startPieces));
            pawns = JSON.parse(JSON.stringify(startPawns));
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            renderBoard();
        }

        // НОВАЯ ФУНКЦИЯ ДЛЯ ПРОПУСКА УРОВНЯ
        function skipLevel() {
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            showMessage("Уровень пропущен!");
            startLevel(currentLevel + 1);
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    
                    const piece = pieces.find(p => p.r === r && p.c === c);
                    if (piece) {
                        cell.innerHTML = `<div class="piece">${piece.symbol}</div><div class="op-val">${piece.op}</div>`;
                        if (selectedPiece && selectedPiece.id === piece.id) cell.classList.add('selected');
                    }

                    const pawn = pawns.find(p => p.r === r && p.c === c);
                    if (pawn) {
                        cell.innerHTML = `<div class="piece">${pawn.symbol}</div><div class="pawn-val">${pawn.val}</div>`;
                    }

                    cell.addEventListener('click', () => handleCellClick(r, c));
                    boardEl.appendChild(cell);
                }
            }
            currentValEl.innerText = currentVal;
            setTimeout(checkWinCondition, 50);
        }

        function handleCellClick(r, c) {
            const clickedPiece = pieces.find(p => p.r === r && p.c === c);
            const clickedPawn = pawns.find(p => p.r === r && p.c === c);

            if (clickedPiece) {
                selectedPiece = clickedPiece;
                renderBoard();
                return;
            }

            if (selectedPiece && clickedPawn) {
                let validChessMove = false;
                if (selectedPiece.id === 'rook' && (selectedPiece.r === r || selectedPiece.c === c)) validChessMove = true;
                if (selectedPiece.id === 'bishop' && Math.abs(selectedPiece.r - r) === Math.abs(selectedPiece.c - c)) validChessMove = true;

                if (!validChessMove) {
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                    showMessage("Неверный ход для этой фигуры!");
                    return;
                }

                let allEntities = [...pieces, ...pawns];
                
                if (!isPathClear(selectedPiece.r, selectedPiece.c, r, c, allEntities)) {
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('warning');
                    showMessage("Путь заблокирован!");
                    return;
                }

                if (selectedPiece.op === '+') currentVal += clickedPawn.val;
                if (selectedPiece.op === '*') currentVal *= clickedPawn.val;
                
                selectedPiece.r = r;
                selectedPiece.c = c;
                pawns = pawns.filter(p => p.id !== clickedPawn.id);
                selectedPiece = null; 
                
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                renderBoard();
            } else if (selectedPiece && !clickedPawn) {
                showMessage("Нужно кликнуть на пешку, чтобы её съесть!");
            }
        }

        function checkWinCondition() {
            if (currentVal === targetVal && pawns.length === 0) {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                startLevel(currentLevel + 1); 
            } else if (pawns.length === 0) {
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                alert(`Итог: ${currentVal}, а нужно: ${targetVal}. Попробуй другой маршрут!`);
                restartCurrentLevel(); 
            }
        }

        startLevel(1);
    </script>
